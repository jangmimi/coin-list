	  color: gray;
	  margin-top: 10px;

  <table>
    <!-- <tr><th>항목</th><th>USD 기준</th></tr> -->
    <!-- <tr><td>BIT</td><td id="BTCUSDT">-</td></tr>
    <tr><td>ETH</td><td id="ETHUSDT">-</td></tr>
    <tr><td>SOL</td><td id="SOLUSDT">-</td></tr>
    <tr><td>SHIBAINU</td><td id="SHIBUSDT">-</td></tr>

    <tr><td>ADA</td><td id="ADAUSDT">-</td></tr>
    <tr><td>PEPE</td><td id="PEPEUSDT">-</td></tr> -->

		<tr>

		  </td>

  <div class="small">
    * 5초 자동 갱신
  </div>

<script>
	let currentExchange = "binance";
	
	const coins = [
	  { symbol: "BTCUSDT", id: "BTCUSDT" },
	  { symbol: "ETHUSDT", id: "ETHUSDT" },
	  { symbol: "SOLUSDT", id: "SOLUSDT" },
	  { symbol: "ADAUSDT", id: "ADAUSDT" },
	  { symbol: "XRPUSDT", id: "XRPUSDT" },
	  { symbol: "1000PEPEUSDT", id: "PEPEUSDT" },
	  { symbol: "1000SHIBUSDT", id: "SHIBUSDT" }
	];
	
	let prevPrices = {};
	
	$(function(){
	
	  $("#exchangeSelect").on("change", function(){
	    currentExchange = $(this).val();
	    loadPrices();
	  });
	
	  loadPrices();
	  setInterval(loadPrices, 5000);
	
	});
	
	function calculateRSI(closes, period = 14){
	  let gains = 0;
	  let losses = 0;

	  for(let i = closes.length - period; i < closes.length - 1; i++){
	    let diff = closes[i+1] - closes[i];
	    if(diff > 0) gains += diff;
	    else losses -= diff;
	  }

	  let avgGain = gains / period;
	  let avgLoss = losses / period;

	  if(avgLoss === 0) return 100;

	  let rs = avgGain / avgLoss;
	  return 100 - (100 / (1 + rs));
	}
	
	function loadPrices(){
	  $.each(coins, function(i, coin){
	
	    let url = "";
	    
	    if(currentExchange === "binance"){
	      url = "https://fapi.binance.com/fapi/v1/ticker/price?symbol=" + coin.symbol;
	    }
	
	    if(currentExchange === "bybit"){
	      url = "https://api.bybit.com/v5/market/tickers?category=linear&symbol=" + coin.symbol;
	    }
	
	    if(currentExchange === "okx"){
	      let okxSymbol = coin.symbol.replace("USDT","-USDT-SWAP");
	      url = "https://www.okx.com/api/v5/market/ticker?instId=" + okxSymbol;
	    }
	
	    $.ajax({
	      url: url,
	      method: "GET",
	      success: function(data){
	
	        let price = 0;
	
	        // Binance
	        if(currentExchange === "binance"){
	          if(!data.price) return;
	          price = parseFloat(data.price);
	        }
	
	        // Bybit
	        if(currentExchange === "bybit"){
	          if(!data.result || !data.result.list.length) return;
	          price = parseFloat(data.result.list[0].lastPrice);
	        }
	
	        // OKX
	        if(currentExchange === "okx"){
	          if(!data.data || !data.data.length) return;
	          price = parseFloat(data.data[0].last);
	        }
	
	        let el = $("#" + coin.id);
	
	        if(prevPrices[coin.symbol]){
	          if(price > prevPrices[coin.symbol]){
	            el.removeClass("down").addClass("up");
	          } else if(price < prevPrices[coin.symbol]){
	            el.removeClass("up").addClass("down");
	          }
	        }
	
	        el.text(price.toLocaleString(undefined, {maximumFractionDigits: 8}));
	        prevPrices[coin.symbol] = price;
	      },
	      error: function(){
	        console.log(currentExchange + " 오류:", coin.symbol);
	      }
	    });
	  });
	}
	
  $(function() {
    if(localStorage.getItem("theme") === "dark") {
      $("body").addClass("dark");
      $("#themeBtn").text("☀️ 라이트모드");
    }

    $("#themeBtn").on("click", function() {
      $("body").toggleClass("dark");

      if($("body").hasClass("dark")) {
        $(this).text("☀️ 라이트모드");
        localStorage.setItem("theme", "dark");
      } else {
        $(this).text("🌙 다크모드");
        localStorage.setItem("theme", "light");
      }
    });
  });
</script>
