<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<style>
	body {
	  font-family: Arial, sans-serif;
	  background-color: #f2f4f7;
	  color: #111;
	  font-size: 14px;
	  transition: all 0.3s ease;
	}
	.coin-container {
	  width: 100%;
	  position: fixed;
	  /* right: 20px;
	  bottom: 20px; */
	  background: #ffffff;
	  padding: 20px;
	  border: 1px solid #ddd;
	  border-radius: 12px;       /* 둥글게 */
	  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
	  transition: all 0.3s ease;
	  z-index: 9999;             /* 다른 요소 위로 */
	  /* opacity: 0.4; */
	}
	.title {
	  font-size: 18px;
	  font-weight: bold;
	  margin-bottom: 15px;
	}
	table {
	  width: 100%;
	  border-collapse: collapse;
	}
	th, td {
	  padding: 8px;
	  text-align: right;
	  border-bottom: 1px solid #eee;
	}
	th {
	  text-align: left;
	  background: #fafafa;
	}
	.tbl-title th {
    text-align: center;
	}
	.up { color: red; }
	.down { color: blue; }
	.small {
	  font-size: 12px;
	  color: gray;
	  margin-top: 10px;
	}
	.rsi-high { color:#ff4d4f; font-weight:bold; }
  .rsi-low { color:#00c853; font-weight:bold; }
	.dark {
	  background-color: #111827 !important;
	  color: #e5e7eb !important;
	}
	.dark .coin-container {
	  background: #1f2937;
	  border: 1px solid #374151;
	}
	.dark th {
	  background: #2d3748;
	}
	.dark td {
	  border-bottom: 1px solid #374151;
	}
	.coin-icon {
	  width:18px;
	  height:18px;
	  margin-right:6px;
	  vertical-align:middle;
	}
	@media (max-width: 768px) {
	  body {
	    font-size: 20px;
	  }
</style>

</head>
<body>

<div class="coin-container">
  <div style="text-align:right; margin-bottom:10px;">
    <button id="themeBtn" class="btn btn-sm btn-secondary">🌙 다크모드</button>
  </div>
  
  <!-- Crypto Exchange select -->
  <div style="margin-bottom:8px;">
	  <select id="exchangeSelect" class="form-select form-select-sm">
	    <option value="bybit" selected>Bybit</option>
	    <option value="binance">Binance</option>
	    <option value="okx">OKX</option>
	  </select>
  </div>
  
  <!-- coin search -->
  <!-- <div style="margin-bottom:8px;">
    <label>Coin name</label>
	  <input type="text" class="form-control">
	  <button class="btn btn-sm btn-github">조회</button>
  </div> -->
  
  <table>
	  <tr class="tbl-title">
	    <th>코인</th>
	    <th>가격(USDT)</th>
	    <th>원화</th>
	    <th>RSI(1m)</th>
	    <th>1분 거래량(USDT)</th>
	  </tr>
    <tr>
		  <td>
		    <img src="https://assets.coingecko.com/coins/images/1/small/bitcoin.png" class="coin-icon">
		    BTC
		  </td>
		  <td id="BTCUSDT">-</td>
	    <td id="BTCUSDT_price">-</td>
	    <td id="BTCUSDT_rsi">-</td>
	    <td id="BTCUSDT_vol">-</td>
		</tr>
		<tr>
		  <td>
		    <img src="https://assets.coingecko.com/coins/images/279/small/ethereum.png" class="coin-icon">
		    ETH
		  </td>
		  <td id="ETHUSDT">-</td>
	    <td id="ETHUSDT_price">-</td>
	    <td id="ETHUSDT_rsi">-</td>
	    <td id="ETHUSDT_vol">-</td>
		</tr>
		<tr>
		  <td>
		    <img src="https://assets.coingecko.com/coins/images/4128/small/solana.png" class="coin-icon">
		    SOL
		  </td>
		  <td id="SOLUSDT">-</td>
	    <td id="SOLUSDT_price">-</td>
	    <td id="SOLUSDT_rsi">-</td>
	    <td id="SOLUSDT_vol">-</td>
		</tr>
		<tr>
		  <td>
		    <img src="https://assets.coingecko.com/coins/images/44/small/xrp-symbol-white-128.png" class="coin-icon">
		    XRP
		  </td>
		  <td id="XRPUSDT">-</td>
      <td id="XRPUSDT_price">-</td>
      <td id="XRPUSDT_rsi">-</td>
      <td id="XRPUSDT_vol">-</td>
		</tr>
		<tr>
		  <td>
		    <img src="https://assets.coingecko.com/coins/images/975/small/cardano.png" class="coin-icon">
		    ADA
		  </td>
		  <td id="ADAUSDT">-</td>
      <td id="ADAUSDT_price">-</td>
      <td id="ADAUSDT_rsi">-</td>
      <td id="ADAUSDT_vol">-</td>
		</tr>
		<tr>
		  <td>
		    <img src="https://assets.coingecko.com/coins/images/29850/small/pepe-token.jpeg" class="coin-icon">
		    PEPE
		  </td>
		  <td id="PEPEUSDT">-</td>
      <td id="PEPEUSDT_price">-</td>
      <td id="PEPEUSDT_rsi">-</td>
      <td id="PEPEUSDT_vol">-</td>
		</tr>
		<tr>
		  <td>
		    <img src="https://assets.coingecko.com/coins/images/11939/small/shiba.png" class="coin-icon">
		    SHIB
		  </td>
		  <td id="SHIBUSDT">-</td>
      <td id="SHIBUSDT_price">-</td>
      <td id="SHIBUSDT_rsi">-</td>
      <td id="SHIBUSDT_vol">-</td>
		</tr>
  </table>

  <div class="small" style="text-align: right;">
    * 5초 자동 갱신
  </div>
</div>

<script>
	$(function() {
	  CoinApp.init();
	});
	
	const CoinApp = {
    currentExchange: "bybit",

    coins: [
      { symbol: "BTCUSDT", id: "BTCUSDT", rsiId:"BTCUSDT_rsi", volId:"BTCUSDT_vol" },
      { symbol: "ETHUSDT", id: "ETHUSDT", rsiId:"ETHUSDT_rsi", volId:"ETHUSDT_vol" },
      { symbol: "SOLUSDT", id: "SOLUSDT", rsiId:"SOLUSDT_rsi", volId:"SOLUSDT_vol" },
      { symbol: "ADAUSDT", id: "ADAUSDT", rsiId:"ADAUSDT_rsi", volId:"ADAUSDT_vol" },
      { symbol: "XRPUSDT", id: "XRPUSDT", rsiId:"XRPUSDT_rsi", volId:"XRPUSDT_vol" },
      { symbol: "1000PEPEUSDT", id: "PEPEUSDT", rsiId:"PEPEUSDT_rsi", volId:"PEPEUSDT_vol" },
      { symbol: "SHIB1000USDT", id: "SHIBUSDT", rsiId:"SHIBUSDT_rsi", volId:"SHIBUSDT_vol" }
    ],
    prevPrices: {},
    init: function() {
      this.bindEvents();
      this.loadPrices();          // 첫 가격 로딩
      this.loadIndicatorsAll();   // 첫 RSI 로딩
      this.startInterval();
    },
    bindEvents: function() {
      const self = this;

      $("#exchangeSelect").on("change", function(){
        self.currentExchange = $(this).val();
        self.loadPrices();
        self.loadIndicatorsAll();
      });
      
      $("#themeBtn").on("click", function() {
        self.toggleTheme();
      });
    },
    startInterval: function() {
      const self = this;

      setInterval(function(){
        self.loadPrices();  // 가격 5초
      }, 5000);

      setInterval(function(){
        self.loadIndicatorsAll(); // 거래량 20초
      }, 30000);

    },
    initTheme: function() {
      if(localStorage.getItem("theme") === "dark") {
        $("body").addClass("dark");
        $("#themeBtn").text("☀️ 라이트모드");
      }
    },
    toggleTheme: function() {
      $("body").toggleClass("dark");

      if($("body").hasClass("dark")) {
        $("#themeBtn").text("☀️ 라이트모드");
        localStorage.setItem("theme", "dark");
      } else {
        $("#themeBtn").text("🌙 다크모드");
        localStorage.setItem("theme", "light");
      }
    },
    getTickerUrl:function(symbol){
      if(this.currentExchange==="bybit"){
        return `https://api.bybit.com/v5/market/tickers?category=linear&symbol=${symbol}`;
      }

      if(this.currentExchange==="binance"){
        return `https://fapi.binance.com/fapi/v1/ticker/price?symbol=${symbol}`;
      }

      if(this.currentExchange==="okx"){
        let okxSymbol=symbol.replace("USDT","-USDT-SWAP");
        return `https://www.okx.com/api/v5/market/ticker?instId=${okxSymbol}`;
      }
    },
    getKlineUrl:function(symbol){
      if(this.currentExchange==="bybit"){
        return `https://api.bybit.com/v5/market/kline?category=linear&symbol=${symbol}&interval=1&limit=100`;
      }

      if(this.currentExchange==="binance"){
        return `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1m&limit=100`;
      }

      if(this.currentExchange==="okx"){
        let okxSymbol = symbol.replace("USDT","-USDT-SWAP");
        return `https://www.okx.com/api/v5/market/candles?instId=${okxSymbol}&bar=1m&limit=100`;
      }
    },
    loadPrices: function() {
      const self = this;

      $.each(this.coins, function(i, coin){
        $.ajax({
          url:self.getTickerUrl(coin.symbol),
          method:"GET",
          success:function(data){
            let price=0;
            
            if(self.currentExchange==="bybit"){
              if(!data.result || !data.result.list.length) return;
              price=parseFloat(data.result.list[0].lastPrice);
            }

            if(self.currentExchange==="binance"){
              if(!data.price) return;
              price=parseFloat(data.price);
            }

            if(self.currentExchange==="okx"){
              if(!data.data || !data.data.length) return;
              price=parseFloat(data.data[0].last);
            }

            self.updatePrice(coin,price);
          }
        });
      });
    },
    updatePrice: function(coin, price){
      let el = $("#" + coin.id);

      if(this.prevPrices[coin.symbol]){
        if(price > this.prevPrices[coin.symbol]){
          el.removeClass("down").addClass("up");
        } else if(price < this.prevPrices[coin.symbol]){
          el.removeClass("up").addClass("down");
        }
      }
      
      let digits = 3;

      if(coin.symbol.includes("PEPE") || coin.symbol.includes("SHIB")){
        digits = 6;
      } else if(coin.symbol.includes("XRP") || coin.symbol.includes("ADA")){
        digits = 4;
      }

      let formatted = price.toLocaleString(undefined, {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });

      el.text(formatted);
      //el.text(price.toLocaleString());
      this.prevPrices[coin.symbol] = price;
    },
    loadIndicatorsAll: function(){
      const self = this;

      $.each(this.coins, function(i, coin){
        self.loadIndicators(coin);
      });
    },
    loadIndicators: function(coin){
      const self = this;

      $.ajax({
        url:this.getKlineUrl(coin.symbol),
        method:"GET",
        success:function(data){
          let closes=[];
          let volumes=[];

          if(self.currentExchange==="bybit"){
            let list=data.result.list.slice().reverse();

            list.forEach(c=>{
              closes.push(parseFloat(c[4]));
              volumes.push(parseFloat(c[6]));
            });

          }

          if(self.currentExchange==="binance"){
            data.forEach(c=>{
              closes.push(parseFloat(c[4]));
              volumes.push(parseFloat(c[5]));
            });

          }

          if(self.currentExchange==="okx"){
            let list=data.data.slice().reverse();

            list.forEach(c=>{
              closes.push(parseFloat(c[4]));
              volumes.push(parseFloat(c[5]));
            });

          }

          if(closes.length<15) return;

          let rsi=self.calculateRSI(closes,14);
          let volume=volumes[volumes.length-1];

          self.updateIndicators(coin,rsi,volume);
        }
      });
    },
    updateIndicators: function(coin, rsi, volume){
      let rsiEl = $("#" + coin.rsiId);
      let volEl = $("#" + coin.volId);

      rsiEl.text(rsi.toFixed(2));
      volEl.text(Number(volume).toLocaleString());

      rsiEl.removeClass("rsi-high rsi-low");

      if(rsi >= 70){
        rsiEl.addClass("rsi-high");
      } else if(rsi <= 30){
        rsiEl.addClass("rsi-low");
      }
    },
    calculateRSI: function(closes, period){
      let gains = 0;
      let losses = 0;

      for(let i = closes.length - period; i < closes.length - 1; i++){
        let diff = closes[i+1] - closes[i];
        if(diff > 0) gains += diff;
        else losses -= diff;
      }

      let avgGain = gains / period;
      let avgLoss = losses / period;

      if(avgLoss === 0) return 100;

      let rs = avgGain / avgLoss;

      return 100 - (100 / (1 + rs));
    },
    getExchangeSymbol: function(exchange, symbol){
      if(exchange === "bybit") return symbol;

      if(exchange === "binance"){
        if(symbol === "1000PEPEUSDT") return "PEPEUSDT";
        return symbol;
      }

      if(exchange === "okx"){
        if(symbol === "1000PEPEUSDT") return "PEPE-USDT";
        if(symbol === "SHIBUSDT") return "SHIB-USDT";
        return symbol.replace("USDT","-USDT");
      }

      return symbol;
    },
  };
</script>

</body>
</html>
